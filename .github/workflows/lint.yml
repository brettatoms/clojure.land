name: Lint

on:
  pull_request:
    types: [opened]
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    name: Lint
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08 # 13.4
        with:
          cli: 1.12.1.1550
      - name: Cache Clojure dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-deps-${{ hashFiles('deps.edn') }}
      - name: Validate projects
        run: clojure -X:validate-projects
      - name: cljfmt
        run: clojure -M:cljfmt check
      - name: clj-kondo
        run: clojure -M:clj-kondo --parallel --fail-level error --lint src
