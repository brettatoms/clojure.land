name: Sync Projects

on:
  workflow_dispatch:
    inputs:
      skip_restart:
        description: Restart Fly.io apps?
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
  schedule:
    # Run every day at 2am
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  deploy:
    name: Sync projects
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: "25"
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.1.1550
      - name: Cache Clojure dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-deps-${{ hashFiles('deps.edn') }}
      - name: Validate projects
        run: clojure -X:validate-projects
      - name: Sync projects
        run: clojure -X:sync-projects
        env:
          LOG_LEVEL: "info"
          GITHUB_API_TOKEN: ${{ secrets._GITHUB_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      - name: Restart App
        run: flyctl apps restart
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
